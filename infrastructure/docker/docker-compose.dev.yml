version: '3.9'

services:
  dev:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dev
    container_name: neurodesk-dev
    volumes:
      - .:/workspace:cached
    command: sleep infinity
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://neuro:neuro123@postgres:5432/neurodesk
      - REDIS_URL=redis://redis:6379
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - postgres
      - redis
      - ollama
    ports:
      - "3001:3001"   # Gateway
      - "3000:3000"   # Next.js (for web preview)

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: neurodesk
      POSTGRES_USER: neuro
      POSTGRES_PASSWORD: neuro123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # For GPU passthrough (if you have NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  postgres_data:
  ollama_data: